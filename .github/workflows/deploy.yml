name: Deploy WISEcon27 PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wisecon27-app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history -> commit-count version number

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wisecon27-app/package-lock.json

      - run: npm ci

      # base must be "/<repo>/" for a GitHub Pages project site.
      # Supabase values come from repo secrets (Settings → Secrets and variables
      # → Actions). The anon key is public-by-design, protected by RLS.
      - run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - uses: actions/configure-pages@v5
        with:
          # auto-enable Pages (build via Actions) so this works without
          # first toggling Settings → Pages manually
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: wisecon27-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
